{% extends 'base.html' %}


{% block content %}
<style>
    .form-box {
        margin-top: 30px;
        background: #fff;
        padding: 50px;
        border-radius: 12px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
        width: 400px;

    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        font-weight: bold;
        margin-bottom: 6px;
        color: #444;
    }

    input,
    textarea,
    select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 14px;
    }

    textarea {
        resize: none;
        height: 80px;
    }

    .checkbox-group {
        display: flex;
        align-items: center;
        justify-content: space-between;
        
        margin-top: 25px;
        text-align: left;
      
    } 

    .checkbox-group input[type="checkbox"] {
        margin-right: -180px;
        margin-left: -43%;
        margin-bottom: 6px;
    }


    button {
        width: 100%;
        padding: 12px;
        background: #007bff;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #0056b3;
    }
</style>
<div style="justify-content: center; display: flex;">
    <div class="form-box">
        <h2>General Form</h2>
        <form method="POST">
            {% for i in edit %}
            {% csrf_token %}
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="full_name" value="{{i.full_name}} "
                    placeholder=" Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" value="{{i.email}}" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" value="{{i.phone}}" placeholder="Enter your phone" required>
            </div>
            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob" value="{{ i.dob|date:'Y-m-d' }}" required>
            </div>
            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender" required>
                    <option value="">-- Select --</option>
                    <option value="Male" {% if i.gender == "Male" %}selected{% endif %}>Male</option>
                    <option value="Female" {% if i.gender == "Female" %}selected{% endif %}>Female</option>
                    <option value="Other" {% if i.gender == "Other" %}selected{% endif %}>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="message">Message / Notes</label>
                <textarea id="message" name="message" placeholder="Type here...">{{i.message}}</textarea>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="agree" name="agree" value="{{i.agree}}" required>
                <label for="agree">I agree to the terms & conditions</label>
            </div>
            {% endfor %}
            <button type="submit">Submit</button>
            <div class="messages">
                {% if messages %}
                {% for message in messages %}
                <div class="{{ message.tags }}">{{ message }}</div>
                {% endfor %}
                {% endif %}
            </div>
        </form>
    </div>
</div>
{%endblock%}
